services:
    app:
        build: .
        container_name: laravel_app
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
        #extra_hosts:
        #    - "host.docker.internal:host-gateway"
        depends_on:
            - postgres

    postgres:
        image: postgres:16
        container_name: bookstore_postgres
        restart: always
        environment:
            POSTGRES_DB: db_bookstore
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5433:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
